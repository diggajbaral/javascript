<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turn On/Off Buld Light</title>
</head>

<style>
    body {
        text-align: center;
    }

    #bulb {
        border: none;
        padding: 30px;
        border-radius: 50%;
        margin-bottom: 30px;
    }
</style>

<body>

    <button id="bulb"></button><br>
    <button id="switch">ON</button>

    <script>

        const bulb = document.getElementById('bulb');
        const switcher = document.getElementById('switch');

        switcher.addEventListener('click', function () {

            if (bulb.style.background === 'yellow') {
                bulb.style.background = 'gray';
                switcher.innerText = 'ON';
            } else {
                bulb.style.background = 'yellow';
                switcher.innerText = 'OFF';
            }

        })

    </script>

</body>

</html>
