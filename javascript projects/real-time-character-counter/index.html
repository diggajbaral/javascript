<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Time Character Counter</title>
</head>

<body>

    <div class="container">
        <h1>Real Time Character Counter</h1>
        <textarea id="textarea" maxlength="50"></textarea>
        <div class="casual">
            <p>Total Character is <span id="totalCounter"></span></p>
            <p>Remaining Character is <span id="remainingCounter"></span></p>
        </div>
    </div>

    <script>

        const textarea = document.getElementById('textarea');
        const totalCounter = document.getElementById('totalCounter');
        const remainingCounter = document.getElementById('remainingCounter');

        textarea.addEventListener('keyup', () => {
            updateCounter();
        });

        function updateCounter() {
            totalCounter.innerText = textarea.value.length;
            remainingCounter.innerText = textarea.getAttribute('maxLength') - textarea.value.length;
        }

    </script>

</body>

</html>
