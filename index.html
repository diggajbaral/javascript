<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
</head>

<body>

    <h1></h1>

    <script>

        function func() {
            const tarik = new Date().toLocaleString();
            document.querySelector('h1').textContent = tarik;
        }

        func();
        setInterval(func, 1000);
        
    </script>

</body>

</html>
